<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <title>Drum Q — Web UI Kit</title>
  <meta name="viewport" content="width=1240">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fafafa; }
    .num { font-family: var(--font-display); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
    .btn-brand { background: #0a0a0a; color: #fff; font-weight: 600; border-radius: 8px; padding: 9px 18px; font-size: 13.5px; display: inline-flex; align-items: center; gap: 8px; border: none; cursor: pointer; font-family: inherit; transition: background 120ms, transform 120ms; }
    .btn-brand:hover { background: #262626; }
    .btn-brand:active { transform: scale(0.98); }
    .btn-outline { background: #fff; color: #0c0c10; border: 1px solid #e5e5e5; font-weight: 600; border-radius: 8px; padding: 9px 18px; font-size: 13.5px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-family: inherit; transition: background 120ms; }
    .btn-outline:hover { background: #fafafa; border-color: #d4d4d4; }
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    [data-screen-label] { scroll-margin-top: 64px; }
  </style>
</head>
<body data-screen-label="Drum Q Web App">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Icons.jsx"></script>
  <script type="text/babel" src="BrandLockup.jsx"></script>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="Overview.jsx"></script>
  <script type="text/babel" src="Views.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>

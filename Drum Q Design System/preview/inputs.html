<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-inline" style="margin-bottom:12px;">Inputs + chips</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
    <div>
      <label style="display:block; font-size:12px; font-weight:600; color: var(--ink-mute); margin-bottom:6px;">📅 วันที่</label>
      <input class="input" value="2025-04-20" style="box-shadow: 0 0 0 3px rgba(10,10,10,0.10); border-color:#0a0a0a;">
    </div>
    <div>
      <label style="display:block; font-size:12px; font-weight:600; color: var(--ink-mute); margin-bottom:6px;">💵 ค่าจ้าง (บาท)</label>
      <input class="input" placeholder="เช่น 1500">
    </div>
  </div>
  <div class="divider"></div>
  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button class="chip chip-active">🥁 งานวง</button>
    <button class="chip">👤 จ้างแทน</button>
    <button class="chip">🎤 ติดคอนเสิร์ต</button>
  </div>
</div></body></html>

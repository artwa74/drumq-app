<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-inline" style="margin-bottom:14px;">Brand · black + hot red</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
    <div>
      <div style="aspect-ratio: 1; background:#0a0a0a; border-radius: 8px;"></div>
      <div style="font-size:12px; font-weight:600; margin-top:6px;">brand</div>
      <div class="mono-label">#0a0a0a</div>
    </div>
    <div>
      <div style="aspect-ratio: 1; background:#000000; border-radius: 8px;"></div>
      <div style="font-size:12px; font-weight:600; margin-top:6px;">brand-deep</div>
      <div class="mono-label">#000000</div>
    </div>
    <div>
      <div style="aspect-ratio: 1; background:#e11d48; border-radius: 8px;"></div>
      <div style="font-size:12px; font-weight:600; margin-top:6px;">brand-hot</div>
      <div class="mono-label">#e11d48</div>
    </div>
    <div>
      <div style="aspect-ratio: 1; background:#fef2f3; border-radius: 8px; border: 1px solid var(--line);"></div>
      <div style="font-size:12px; font-weight:600; margin-top:6px;">brand-light</div>
      <div class="mono-label">#fef2f3</div>
    </div>
  </div>
</div></body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-inline" style="margin-bottom:14px;">Semantic · used in content only</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
    <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;">
      <div style="width:20px; height:20px; border-radius:4px; background:#12b981;"></div>
      <div><div style="font-size:13px; font-weight:600;">success</div><div class="mono-label">#12b981 · PAID</div></div>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;">
      <div style="width:20px; height:20px; border-radius:4px; background:#e11d48;"></div>
      <div><div style="font-size:13px; font-weight:600;">danger</div><div class="mono-label">#e11d48 · UNPAID</div></div>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;">
      <div style="width:20px; height:20px; border-radius:4px; background:#ffa51f;"></div>
      <div><div style="font-size:13px; font-weight:600;">warn</div><div class="mono-label">#ffa51f</div></div>
    </div>
    <div style="display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:8px;">
      <div style="width:20px; height:20px; border-radius:4px; background: linear-gradient(135deg,#ff4d6d,#ff2d55);"></div>
      <div><div style="font-size:13px; font-weight:600;">danger-grad</div><div class="mono-label">Finance hero only</div></div>
    </div>
  </div>
</div></body></html>

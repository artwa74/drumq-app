<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-inline" style="margin-bottom:14px;">Neutrals · ink + surface + line</div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px;">
    <div><div style="aspect-ratio:1; background:#0c0c10; border-radius:8px;"></div><div style="font-size:11px; font-weight:600; margin-top:5px;">ink</div><div class="mono-label">#0c0c10</div></div>
    <div><div style="aspect-ratio:1; background:#1a1a20; border-radius:8px;"></div><div style="font-size:11px; font-weight:600; margin-top:5px;">ink-soft</div><div class="mono-label">#1a1a20</div></div>
    <div><div style="aspect-ratio:1; background:#5a5a66; border-radius:8px;"></div><div style="font-size:11px; font-weight:600; margin-top:5px;">ink-mute</div><div class="mono-label">#5a5a66</div></div>
    <div><div style="aspect-ratio:1; background:#8e8e98; border-radius:8px;"></div><div style="font-size:11px; font-weight:600; margin-top:5px;">ink-dim</div><div class="mono-label">#8e8e98</div></div>
    <div><div style="aspect-ratio:1; background:#f4f4f5; border-radius:8px; border:1px solid var(--line);"></div><div style="font-size:11px; font-weight:600; margin-top:5px;">surface-3</div><div class="mono-label">#f4f4f5</div></div>
  </div>
  <div class="divider"></div>
  <div style="display:flex; gap: 14px; align-items:center;">
    <div style="width:40px; height:40px; background:#fff; border:1px solid #e5e5e5; border-radius:8px;"></div>
    <div><div style="font-size:12px; font-weight:600;">surface · #fff</div><div class="mono-label">line #e5e5e5 · line-strong #d4d4d4</div></div>
  </div>
</div></body></html>

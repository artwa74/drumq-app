<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body><div class="card">
  <div class="eyebrow-inline" style="margin-bottom: 14px;">Motion · duration × easing</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
    <div style="padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;">
      <div style="font-size: 13px; font-weight: 600;">120 · fast</div>
      <div class="mono-label">state (hover, press)</div>
    </div>
    <div style="padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;">
      <div style="font-size: 13px; font-weight: 600;">200 · base</div>
      <div class="mono-label">layout shifts</div>
    </div>
    <div style="padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;">
      <div style="font-size: 13px; font-weight: 600;">320 · slow</div>
      <div class="mono-label">overlays, modals</div>
    </div>
    <div style="padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;">
      <div style="font-size: 13px; font-weight: 600;">480 · hero</div>
      <div class="mono-label">big page moments</div>
    </div>
  </div>
  <div class="divider"></div>
  <div style="font-size: 12px; color: var(--fg-3); font-family: var(--font-mono);">
    --ease-standard: cubic-bezier(0.4, 0, 0.2, 1)<br>
    --ease-soft:     cubic-bezier(0.34, 1.56, 0.64, 1)
  </div>
</div></body></html>

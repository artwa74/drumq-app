<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>

      <div class="mono-label">resting cards</div>

      <div style="font-size:13px; font-weight:600;">float</div>
      <div class="mono-label">popovers</div>
    </div>
    <div style="background: linear-gradient(135deg,#ff4d6d,#ff2d55); padding:14px; border-radius:12px; color:#fff; box-shadow: 0 4px 12px -2px rgba(225,29,72,0.3);">
      <div style="font-size:13px; font-weight:600;">glow</div>
      <div class="mono-label" style="color:rgba(255,255,255,.8);">hero only</div>
